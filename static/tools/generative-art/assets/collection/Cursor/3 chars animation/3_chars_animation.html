<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="X-UA-Compatible" content="ie=edge" />
<title>Paper.js</title>
<link rel="stylesheet" href="./../PaperJSEngine/style.css" >
<script type="text/javascript" src="./../PaperJSEngine/paper-full.js"></script>
<script type="text/paperscript" canvas="canvas">

var rGroup = new Group()
var gGroup = new Group()
var bGroup = new Group()

var rPath = project.importSVG('svg1')
rPath.fillColor = 'blue'
rPath.strokeColor = 'blue'
var rBorder = Path.Rectangle({
  size: rPath.bounds,
  strokeColor: 'blue',
  strokeWidth: 0.2
})
rGroup.addChild(rPath)
rGroup.addChild(rBorder)


var gPath = project.importSVG('svg2')
gPath.fillColor = 'blue'
var gBorder = Path.Rectangle({
  size: gPath.bounds,
  strokeColor: 'blue',
  strokeWidth: 0.2
})
gGroup.addChild(gPath)
gGroup.addChild(gBorder)

var bPath = project.importSVG('svg3')
bPath.fillColor = 'blue'
var bBorder = Path.Rectangle({
  size: bPath.bounds,
  strokeColor: 'blue',
  strokeWidth: 0.2
})
bGroup.addChild(bPath)
bGroup.addChild(bBorder)

rGroup.position = view.center
gGroup.position = view.center
bGroup.position = view.center


rGroup.applyMatrix = false
gGroup.applyMatrix = false
bGroup.applyMatrix = false

// rGroup.onMouseDown = function(even){
//     rGroup.tweenTo({
//       'scaling': 0.5
//     }, 300)
// }


function onMouseDown(event){
  rGroup.tweenTo({
    'scaling': 0.9,
    'rotation': 12,
  }, 150)

  gGroup.tweenTo({
    'scaling': 0.9,
    'rotation': -12,
  }, 150)

  bGroup.tweenTo({
    'scaling': 0.9,
    'rotation': -20,
  }, 150)
}

function onMouseUp(event){
  rGroup.tweenTo({
    'scaling': 1,
    'rotation': 1,
  }, 150)

  gGroup.tweenTo({
    'scaling': 1,
    'rotation': 1,
  }, 150)

  bGroup.tweenTo({
    'scaling': 1,
    'rotation': 1,
  }, 150)
}

// project.activeLayer.position = view.center




</script>
</head>
