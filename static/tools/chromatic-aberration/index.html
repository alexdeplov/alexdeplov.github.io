<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chromatic Aberration Shader - Alexander Deplov</title>
  <meta name="description" content="A WebGL image effect tool for chromatic aberration experiments.">
  <meta name="author" content="Alexander Deplov">
  <link rel="canonical" href="https://interfacecraft.online/tools/chromatic-aberration/">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://interfacecraft.online/tools/chromatic-aberration/">
  <meta property="og:title" content="Chromatic Aberration Shader - Alexander Deplov">
  <meta property="og:description" content="A WebGL image effect tool for chromatic aberration experiments.">
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --panel: #111;
      --text: #f7f7f7;
      --muted: #a1a1aa;
      --line: #2f2f34;
      --accent: #ff7800;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        var(--bg);
      background-size: 38px 38px;
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 24px;
    }

    .panel {
      width: min(720px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: clamp(28px, 6vw, 56px);
      background: rgba(17, 17, 17, 0.92);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(2rem, 8vw, 4.8rem);
      line-height: 0.95;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    p {
      max-width: 56ch;
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.65;
    }

    .back {
      display: inline-block;
      margin-bottom: 28px;
      color: var(--muted);
      font-size: 0.875rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .status {
      display: inline-flex;
      margin-top: 28px;
      border: 1px solid var(--accent);
      border-radius: 999px;
      padding: 8px 12px;
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <section class="panel" aria-labelledby="title">
      <a class="back" href="/">Back to home</a>
      <h1 id="title">Chromatic Aberration Shader</h1>
      <p>
        This tool page is live again. I am keeping the deploy-safe version here first,
        then the full interactive WebGL editor can be reintroduced in smaller pieces.
      </p>
      <span class="status">Deploy-safe version</span>
    </section>
  </main>
</body>
</html>
