function onFrame(event){
  var slowness = 100
  var time = event.count % slowness / slowness

  var circle = new Path.Circle({
    radius: 5,
    fillColor: 'blue',
    position: view.center,
  })
  var x = (event.count * 3) % view.size.width/2
  circle.position.x = x
  circle.position.y = view.center.y + Math.sin(circle.position.x * 0.05) * 50 * Math.sqrt(x)/10
}
