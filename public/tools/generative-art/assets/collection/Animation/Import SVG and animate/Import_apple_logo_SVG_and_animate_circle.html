    <meta charset="UTF-8" />

    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Paper.js</title>
    <link rel="stylesheet" href="../PaperJSEngine/style.css" />
    <script type="text/javascript" src="../PaperJSEngine/paper-full.js"></script>
    <script type="text/paperscript" canvas="canvas">

    var path = project.importSVG(document.getElementById('svg'))
    path.strokeColor = 'darkgray'
    path.strokeWidth = 1
    path.position = view.center
    path.scale(0.2)
    path.opacity = 0

    var tail = project.importSVG(document.getElementById('svg2'))
    tail.strokeColor = 'darkgray'
    tail.strokeWidth = 1
    tail.position.x = path.position.x + 25
    tail.position.y = path.position.y - 130
    tail.scale(0.2)
    tail.opacity = 0

    function onFrame(event) {
        var slowness = 200
        var time = event.count % slowness / slowness
        updateRectangle(event.count * 0.005)
    }

    function createCircleForBody(time){
      var circle = new Path.Circle({
          center: view.center,
          radius: 7,
          fillColor: 'blue'
      })
      

      circle.fillColor.hue += time * 60 //% 50

      var offset = time * path.children[1].children[0].length
      var point = path.children[1].children[0].getPointAt(offset)
      // var tangent = path.children[1].children[0].getTangentAt(offset)
      circle.position = point
      // circle.rotation = tangent.angle
    }

    function createCircleForTail(time){
      var circle = new Path.Circle({
          center: view.center,
          radius: 7,
          fillColor: 'red'
      })

      circle.fillColor.hue += time * 60 //% 50

      var offset = time * tail.children[1].children[0].length
      var point = tail.children[1].children[0].getPointAt(offset)
      // var tangent = tail.children[1].children[0].getTangentAt(offset)
      circle.position = point
      // circle.rotation = tangent.angle
    }

    function updateRectangle(time) {

        if (time <= 0.99){
          createCircleForBody(time)
          createCircleForTail(time)
        }
    }


    </script>
    </head>
