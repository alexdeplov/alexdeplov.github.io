<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="/tools/chromatic-aberration/styles.css">
</head>
<body>
  <a class="tool-home-button" href="/blog/" aria-label="Open blog">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 10.75L12 3.75L21 10.75" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M5.75 9.5V20.25H18.25V9.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M9.75 20.25V14.25H14.25V20.25" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>

  <main class="app">
    <aside class="sidebar">
      <header class="sidebar-head">
        <div class="title-row">
          <h1>Chromatic Aberration Shader</h1>
          <span class="shader-badge">WebGL</span>
        </div>

        <div class="top-actions">
          <input class="file-input" id="fileInput" type="file" accept="image/*">
          <button class="button" id="chooseButton" type="button">Choose image</button>
          <button class="button secondary" id="saveButton" type="button">Save PNG</button>
        </div>
      </header>

      <section class="controls" aria-label="Chromatic aberration controls">
        <div class="section">
          <h2 class="section-title">Presets</h2>
          <div class="preset-grid" id="presetGrid">
            <button class="preset-button is-active" type="button" data-preset="clean">Clean lens</button>
            <button class="preset-button" type="button" data-preset="wide">Wide edge</button>
            <button class="preset-button" type="button" data-preset="purple">Purple fringe</button>
            <button class="preset-button" type="button" data-preset="prism">Prism split</button>
            <button class="preset-button" type="button" data-preset="tangent">Tangent spin</button>
            <button class="preset-button" type="button" data-preset="spectral">Spectral burst</button>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">Mode</h2>
          <div class="segmented" data-columns="2" id="modeButtons" aria-label="Aberration mode">
            <button type="button" data-mode="0" aria-pressed="true">Lateral</button>
            <button type="button" data-mode="1" aria-pressed="false">Axial</button>
            <button type="button" data-mode="2" aria-pressed="false">Prism</button>
            <button type="button" data-mode="3" aria-pressed="false">Tangential</button>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">Fringe Colors</h2>
          <div class="segmented" data-columns="3" id="paletteButtons" aria-label="Fringe color profile">
            <button type="button" data-palette="0" aria-pressed="true">Red/Blue</button>
            <button type="button" data-palette="1" aria-pressed="false">Blue/Red</button>
            <button type="button" data-palette="2" aria-pressed="false">Green/Purple</button>
            <button type="button" data-palette="3" aria-pressed="false">Purple/Green</button>
            <button type="button" data-palette="4" aria-pressed="false">Spectrum</button>
            <button type="button" data-palette="5" aria-pressed="false">Warm/Cool</button>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">Lens</h2>
          <label class="control">
            <span class="control-head">
              <span>Strength</span>
              <span class="value" data-value-for="strength">18</span>
            </span>
            <input type="range" min="0" max="100" step="1" value="18" data-control="strength">
          </label>
          <label class="control">
            <span class="control-head">
              <span>Falloff</span>
              <span class="value" data-value-for="falloff">1.4</span>
            </span>
            <input type="range" min="0.25" max="4" step="0.05" value="1.4" data-control="falloff">
          </label>
          <label class="control">
            <span class="control-head">
              <span>Start offset</span>
              <span class="value" data-value-for="start">0.18</span>
            </span>
            <input type="range" min="0" max="0.9" step="0.01" value="0.18" data-control="start">
          </label>
          <label class="control">
            <span class="control-head">
              <span>Distortion</span>
              <span class="value" data-value-for="distortion">0.08</span>
            </span>
            <input type="range" min="-1" max="1" step="0.01" value="0.08" data-control="distortion">
          </label>
        </div>

        <div class="section">
          <h2 class="section-title">Focus</h2>
          <label class="control">
            <span class="control-head">
              <span>Channel blur</span>
              <span class="value" data-value-for="blur">0.0</span>
            </span>
            <input type="range" min="0" max="12" step="0.1" value="0" data-control="blur">
          </label>
          <label class="control">
            <span class="control-head">
              <span>Edge boost</span>
              <span class="value" data-value-for="edge">0.18</span>
            </span>
            <input type="range" min="0" max="1" step="0.01" value="0.18" data-control="edge">
          </label>
        </div>

        <div class="section">
          <h2 class="section-title">Direction</h2>
          <label class="control">
            <span class="control-head">
              <span>Angle</span>
              <span class="value" data-value-for="angle">0 deg</span>
            </span>
            <input type="range" min="0" max="360" step="1" value="0" data-control="angle">
          </label>
          <div class="control-row">
            <label class="control">
              <span class="control-head">
                <span>Center X</span>
                <span class="value" data-value-for="centerX">50%</span>
              </span>
              <input type="range" min="0" max="100" step="1" value="50" data-control="centerX">
            </label>
            <label class="control">
              <span class="control-head">
                <span>Center Y</span>
                <span class="value" data-value-for="centerY">50%</span>
              </span>
              <input type="range" min="0" max="100" step="1" value="50" data-control="centerY">
            </label>
          </div>
        </div>
      </section>

      <footer class="sidebar-head">
        <button class="button secondary" id="resetButton" type="button">Reset</button>
      </footer>
    </aside>

    <section class="stage">
      <div class="stage-bar">
        <div class="image-meta" id="imageMeta"></div>
        <div class="status" id="statusText">Ready</div>
      </div>

      <div class="drop-zone" id="dropZone" tabindex="0">
        <div class="canvas-frame">
          <canvas id="renderCanvas" aria-label="Chromatic aberration preview"></canvas>
          <div class="empty-state" id="emptyState">
            <span><strong>Drop image</strong> PNG, JPG, WebP, GIF, or SVG</span>
          </div>
          <div class="fallback" id="fallbackMessage">WebGL is not available in this browser.</div>
        </div>
      </div>

      <footer class="stage-foot">
        <span>Alexander Deplov</span>
        <a href="/tools/color-percentage/">Image Color Percentages</a>
      </footer>
    </section>
  </main>

  <script id="vertexShader" type="x-shader/x-vertex">
    attribute vec2 a_position;
    varying vec2 v_uv;

    void main() {
      v_uv = a_position * 0.5 + 0.5;
      gl_Position = vec4(a_position, 0.0, 1.0);
    }
  </script>

  <script id="fragmentShader" type="x-shader/x-fragment">
    precision highp float;

    uniform sampler2D u_image;
    uniform vec2 u_resolution;
    uniform vec2 u_center;
    uniform float u_strength;
    uniform float u_falloff;
    uniform float u_start;
    uniform float u_distortion;
    uniform float u_blur;
    uniform float u_edge;
    uniform float u_angle;
    uniform float u_mode;
    uniform float u_palette;

    varying vec2 v_uv;

    vec2 clampUv(vec2 uv) {
      vec2 texel = 0.5 / u_resolution;
      return clamp(uv, texel, 1.0 - texel);
    }

    vec3 readImage(vec2 uv) {
      return texture2D(u_image, clampUv(uv)).rgb;
    }

    vec3 blurImage(vec2 uv, float radiusPx) {
      vec2 px = radiusPx / u_resolution;
      vec3 color = readImage(uv) * 0.36;
      color += readImage(uv + vec2(px.x, 0.0)) * 0.11;
      color += readImage(uv - vec2(px.x, 0.0)) * 0.11;
      color += readImage(uv + vec2(0.0, px.y)) * 0.11;
      color += readImage(uv - vec2(0.0, px.y)) * 0.11;
      color += readImage(uv + px) * 0.05;
      color += readImage(uv - px) * 0.05;
      color += readImage(uv + vec2(px.x, -px.y)) * 0.05;
      color += readImage(uv + vec2(-px.x, px.y)) * 0.05;
      return color;
    }

    vec3 profile() {
      if (u_palette < 0.5) {
        return vec3(1.0, 0.0, -1.0);
      }
      if (u_palette < 1.5) {
        return vec3(-1.0, 0.0, 1.0);
      }
      if (u_palette < 2.5) {
        return vec3(-0.72, 1.0, -0.72);
      }
      if (u_palette < 3.5) {
        return vec3(0.72, -1.0, 0.72);
      }
      if (u_palette < 4.5) {
        return vec3(1.18, -0.28, -1.25);
      }
      return vec3(0.9, -0.16, -0.92);
    }

    vec3 fringeTint() {
      if (u_palette < 0.5) {
        return vec3(1.0, 0.12, 0.72);
      }
      if (u_palette < 1.5) {
        return vec3(0.15, 0.62, 1.0);
      }
      if (u_palette < 2.5) {
        return vec3(0.78, 0.0, 1.0);
      }
      if (u_palette < 3.5) {
        return vec3(0.0, 1.0, 0.52);
      }
      if (u_palette < 4.5) {
        return vec3(1.0, 0.55, 0.04);
      }
      return vec3(0.0, 0.92, 1.0);
    }

    float edgeMask(vec2 uv) {
      vec2 px = 1.0 / u_resolution;
      vec3 dx = readImage(uv + vec2(px.x, 0.0)) - readImage(uv - vec2(px.x, 0.0));
      vec3 dy = readImage(uv + vec2(0.0, px.y)) - readImage(uv - vec2(0.0, px.y));
      float e = length(dx) + length(dy);
      return smoothstep(0.08, 0.42, e);
    }

    void main() {
      vec2 uv = v_uv;
      vec2 centered = uv - u_center;
      vec2 pixelSpace = centered * u_resolution;
      float radius = length(pixelSpace) / length(u_resolution * 0.5);
      float zone = smoothstep(u_start, 1.0, radius);
      float shaped = pow(max(zone, 0.0001), u_falloff);

      float radialWarp = 1.0 + u_distortion * radius * radius * 0.28;
      vec2 baseUv = u_center + centered * radialWarp;
      vec2 directionPx = normalize(pixelSpace + vec2(0.0001));
      vec2 tangentPx = normalize(vec2(-pixelSpace.y, pixelSpace.x) + vec2(0.0001));
      vec2 prismPx = vec2(cos(u_angle), sin(u_angle));

      float strengthPx = u_strength * 0.48;
      vec2 offsetPx = directionPx * strengthPx * shaped;

      if (u_mode > 0.5 && u_mode < 1.5) {
        offsetPx = directionPx * strengthPx * (0.45 + shaped * 0.55);
      } else if (u_mode > 1.5 && u_mode < 2.5) {
        offsetPx = prismPx * strengthPx;
      } else if (u_mode > 2.5) {
        offsetPx = tangentPx * strengthPx * shaped;
      }

      vec2 offset = offsetPx / u_resolution;
      vec3 signProfile = profile();
      vec3 base = readImage(baseUv);
      float e = edgeMask(baseUv);
      float blurBase = u_blur * (0.22 + e * 1.38);

      vec3 redSample = u_mode > 0.5 && u_mode < 1.5
        ? blurImage(baseUv + offset * signProfile.r * 0.55, blurBase * 1.05)
        : readImage(baseUv + offset * signProfile.r);
      vec3 greenSample = u_mode > 0.5 && u_mode < 1.5
        ? blurImage(baseUv + offset * signProfile.g * 0.28, blurBase * 0.34)
        : readImage(baseUv + offset * signProfile.g);
      vec3 blueSample = u_mode > 0.5 && u_mode < 1.5
        ? blurImage(baseUv + offset * signProfile.b * 0.68, blurBase * 1.24)
        : readImage(baseUv + offset * signProfile.b);

      vec3 color = vec3(redSample.r, greenSample.g, blueSample.b);
      vec3 split = color - base;
      color += split * u_edge * (0.35 + e * 1.2);
      color += fringeTint() * e * u_edge * u_strength * 0.006;
      color = mix(base, color, smoothstep(0.0, 0.035, u_strength));

      gl_FragColor = vec4(clamp(color, 0.0, 1.0), 1.0);
    }
  </script>

  <script src="/tools/chromatic-aberration/app.js"></script>
</body>
</html>
