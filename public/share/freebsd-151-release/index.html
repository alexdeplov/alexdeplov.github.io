<style>
  .site-toast {
    left: 50%;
    opacity: 0;
    pointer-events: none;
    position: fixed;
    top: 1rem;
    transform: translate(-50%, -0.5rem);
    transition: opacity 160ms ease, transform 160ms ease;
    z-index: 3000;
  }

  .site-toast.is-visible {
    opacity: 1;
    transform: translate(-50%, 0);
  }

  .site-toast-message {
    background: rgba(24, 24, 27, 0.94);
    border-radius: 999px;
    box-shadow: 0 12px 34px rgba(0, 0, 0, 0.22);
    color: #fff;
    font-size: 0.875rem;
    font-weight: 600;
    line-height: 1;
    max-width: calc(100vw - 2rem);
    padding: 0.75rem 1rem;
    white-space: nowrap;
  }

  @media (prefers-reduced-motion: reduce) {
    .site-toast {
      transition: none;
    }
  }
</style>

<script>
  (function () {
    const toast = document.querySelector('[data-site-toast]');
    const message = document.querySelector('[data-site-toast-message]');
    let hideTimer = null;

    if (!toast || !message) {
      return;
    }

    window.showSiteToast = function (text, options) {
      const duration = options && Number.isFinite(options.duration) ? options.duration : 1800;

      window.clearTimeout(hideTimer);
      message.textContent = text || '';
      toast.classList.add('is-visible');

      hideTimer = window.setTimeout(function () {
        toast.classList.remove('is-visible');
      }, duration);
    };

    window.addEventListener('site-toast', function (event) {
      const detail = event.detail || {};
      window.showSiteToast(detail.message || '', detail);
    });
  }());
</script>
