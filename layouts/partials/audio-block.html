<div class="mt-6 audio-player text-black rounded-xl p-6 min-h-[220px] relative overflow-hidden flex items-center"
  data-audio-src="{{ .src }}" {{ if .img
  }}style="background-image: url('{{ .img }}'); background-size: cover; background-position: center;" {{ end }}>

  {{ if .img }}
  <div class="absolute inset-0 bg-black bg-opacity-30 pointer-events-none"></div>
  {{ end }}

  <div
    class="absolute bottom-0 left-0 right-0 top-0 bg-black bg-opacity-5 bg-gradient-to-b from-black/0 to-black/80 pointer-events-none">
  </div>

  <!-- Hidden audio player -->
  <audio class="audio-element hidden">
    <source src="{{ .src }}" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <div class="audio-content relative z-10 flex w-full min-w-0 items-center gap-8">
    {{ if .img }}
    <div
      class="cover-art-wrap relative shrink-0 cursor-pointer overflow-hidden rounded-xl shadow-lg transition-transform duration-300 ease-in-out hover:scale-[1.02]"
      role="button" tabindex="0" aria-label="Play or pause audio">

      <img class="cover-art block h-full w-full object-cover !mt-0" src="{{ .img }}" alt="">

      <div class="absolute inset-0 flex items-center justify-center bg-black bg-opacity-10">
        <div class="play-button-container relative h-16 w-16 shrink-0 rounded-full backdrop-blur-md">
          <!-- Button background: below progress ring, scales on hover -->
          <div
            class="play-button-bg is-image-bg pointer-events-none absolute inset-0 z-0 rounded-full bg-black bg-opacity-25 transition-transform transition-colors duration-300 ease-in-out">
          </div>

          <!-- Circular Progress SVG: above dark background -->
          <svg class="circular-progress pointer-events-none absolute left-0 top-0 z-20 h-16 w-16 -rotate-90"
            viewBox="0 0 100 100">
            <circle class="progress-bg" cx="50" cy="50" r="46"
              stroke="{{ if .img }}rgba(255, 255, 255, 0.28){{ else }}rgba(0, 0, 0, 0.1){{ end }}" stroke-width="4"
              fill="none" />

            <circle class="progress-indicator" cx="50" cy="50" r="46"
              stroke="{{ if .img }}white{{ else }}#3B82F6{{ end }}" stroke-width="4" stroke-dasharray="289.027"
              stroke-dashoffset="289.027" fill="none" />
          </svg>

          <!-- Play Button: keeps original hover:scale-110 group behavior -->
          <div
            class="play-button relative z-30 flex h-16 w-16 cursor-pointer items-center justify-center rounded-full bg-transparent transition-transform duration-300 ease-in-out hover:scale-110 group">
            <div class="flex transition-transform duration-100 ease-in-out group-hover:scale-110">
              <svg class="play-icon ml-1" width="28" height="29" viewBox="0 0 23 24" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M4.86328 17.0763V5.73008C4.86328 4.67612 5.98644 4.00223 6.9164 4.49821L17.5535 10.1713C18.539 10.6969 18.539 12.1095 17.5535 12.6351L6.9164 18.3082C5.98643 18.8042 4.86328 18.1303 4.86328 17.0763Z"
                  fill="{{ if .img }}white{{ else }}black{{ end }}" />
              </svg>

              <svg class="pause-icon hidden" width="18" height="29" viewBox="0 0 24 25" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M4.78357 0.535156C5.95923 0.535156 6.54733 0.534895 6.99646 0.763672C7.39159 0.965003 7.7131 1.28651 7.91443 1.68164C8.14331 2.13085 8.14294 2.71942 8.14294 3.89551V21.1748C8.14294 22.3509 8.14331 22.9395 7.91443 23.3887C7.71311 23.7837 7.39146 24.1044 6.99646 24.3057C6.54731 24.5345 5.95936 24.5352 4.78357 24.5352H3.70349C2.5274 24.5352 1.93883 24.5345 1.48962 24.3057C1.09466 24.1044 0.772953 23.7836 0.571655 23.3887C0.342772 22.9395 0.34314 22.3509 0.34314 21.1748V3.89551C0.34314 2.71947 0.342806 2.13084 0.571655 1.68164C0.772987 1.28651 1.09449 0.965003 1.48962 0.763672C1.93883 0.534803 2.52742 0.535156 3.70349 0.535156H4.78357ZM19.7015 0.535156C20.8772 0.535156 21.4653 0.534925 21.9144 0.763672C22.3096 0.964998 22.6311 1.28652 22.8324 1.68164C23.0613 2.13085 23.0609 2.71941 23.0609 3.89551V21.1748C23.0609 22.3509 23.0613 22.9395 22.8324 23.3887C22.6311 23.7837 22.3094 24.1044 21.9144 24.3057C21.4653 24.5345 20.8774 24.5352 19.7015 24.5352H18.6215C17.4454 24.5352 16.8568 24.5345 16.4076 24.3057C16.0126 24.1043 15.6909 23.7836 15.4896 23.3887C15.2607 22.9395 15.2611 22.3509 15.2611 21.1748V3.89551C15.2611 2.7195 15.2608 2.13084 15.4896 1.68164C15.6909 1.28652 16.0125 0.965005 16.4076 0.763672C16.8568 0.534789 17.4454 0.535156 18.6215 0.535156H19.7015Z"
                  fill="{{ if .img }}white{{ else }}black{{ end }}" />
              </svg>
            </div>
          </div>
        </div>
      </div>
    </div>
    {{ else }}
    <div class="play-button-container relative h-16 w-16 shrink-0 rounded-full backdrop-blur-md">
      <!-- Button background: below progress ring, scales on hover -->
      <div
        class="play-button-bg pointer-events-none absolute inset-0 z-0 rounded-full bg-blue-50 transition-transform duration-300 ease-in-out">
      </div>

      <!-- Circular Progress SVG: above button background -->
      <svg class="circular-progress pointer-events-none absolute left-0 top-0 z-20 h-16 w-16 -rotate-90"
        viewBox="0 0 100 100">
        <circle class="progress-bg" cx="50" cy="50" r="46" stroke="rgba(0, 0, 0, 0.1)" stroke-width="4" fill="none" />
        <circle class="progress-indicator" cx="50" cy="50" r="46" stroke="#3B82F6" stroke-width="4"
          stroke-dasharray="289.027" stroke-dashoffset="289.027" fill="none" />
      </svg>

      <!-- Play Button: keeps original hover:scale-110 group behavior -->
      <div
        class="play-button relative z-30 flex h-16 w-16 cursor-pointer items-center justify-center rounded-full bg-transparent transition-transform duration-300 ease-in-out hover:scale-110 group">
        <div class="flex transition-transform duration-100 ease-in-out group-hover:scale-110">
          <svg class="play-icon ml-1" width="28" height="29" viewBox="0 0 23 24" fill="none"
            xmlns="http://www.w3.org/2000/svg">
            <path
              d="M4.86328 17.0763V5.73008C4.86328 4.67612 5.98644 4.00223 6.9164 4.49821L17.5535 10.1713C18.539 10.6969 18.539 12.1095 17.5535 12.6351L6.9164 18.3082C5.98643 18.8042 4.86328 18.1303 4.86328 17.0763Z"
              fill="black" />
          </svg>

          <svg class="pause-icon hidden" width="18" height="29" viewBox="0 0 24 25" fill="none"
            xmlns="http://www.w3.org/2000/svg">
            <path
              d="M4.78357 0.535156C5.95923 0.535156 6.54733 0.534895 6.99646 0.763672C7.39159 0.965003 7.7131 1.28651 7.91443 1.68164C8.14331 2.13085 8.14294 2.71942 8.14294 3.89551V21.1748C8.14294 22.3509 8.14331 22.9395 7.91443 23.3887C7.71311 23.7837 7.39146 24.1044 6.99646 24.3057C6.54731 24.5345 5.95936 24.5352 4.78357 24.5352H3.70349C2.5274 24.5352 1.93883 24.5345 1.48962 24.3057C1.09466 24.1044 0.772953 23.7836 0.571655 23.3887C0.342772 22.9395 0.34314 22.3509 0.34314 21.1748V3.89551C0.34314 2.71947 0.342806 2.13084 0.571655 1.68164C0.772987 1.28651 1.09449 0.965003 1.48962 0.763672C1.93883 0.534803 2.52742 0.535156 3.70349 0.535156H4.78357ZM19.7015 0.535156C20.8772 0.535156 21.4653 0.534925 21.9144 0.763672C22.3096 0.964998 22.6311 1.28652 22.8324 1.68164C23.0613 2.13085 23.0609 2.71941 23.0609 3.89551V21.1748C23.0609 22.3509 23.0613 22.9395 22.8324 23.3887C22.6311 23.7837 22.3094 24.1044 21.9144 24.3057C21.4653 24.5345 20.8774 24.5352 19.7015 24.5352H18.6215C17.4454 24.5352 16.8568 24.5345 16.4076 24.3057C16.0126 24.1043 15.6909 23.7836 15.4896 23.3887C15.2607 22.9395 15.2611 22.3509 15.2611 21.1748V3.89551C15.2611 2.7195 15.2608 2.13084 15.4896 1.68164C15.6909 1.28652 16.0125 0.965005 16.4076 0.763672C16.8568 0.534789 17.4454 0.535156 18.6215 0.535156H19.7015Z"
              fill="black" />
          </svg>
        </div>
      </div>
    </div>
    {{ end }}

    <div
      class="audio-info flex min-w-0 flex-1 flex-col justify-center text-left leading-[1.2] {{ if .img }}text-white{{ end }}">
      <a class="block truncate text-xl font-semibold hover:underline" href="{{ .src }}" download>
        {{ .src | path.Base }}
      </a>

      <div class="mt-1 text-xs font-medium opacity-80">
        Click to download
      </div>

      <input class="seekbar audio-seekbar" type="range" min="0" max="100" value="0" step="0.1" aria-label="Seek audio">
    </div>
  </div>

  <div
    class="ai-music-tag absolute bottom-3 right-3 z-20 text-xs font-medium opacity-15 {{ if .img }}text-white{{ end }}">
    AI music
  </div>
</div>

<style>
  .audio-player {
    box-sizing: border-box;
  }

  .audio-content {
    min-height: 150px;
  }

  .cover-art-wrap {
    width: 150px;
    height: 150px;
  }

  .audio-info {
    max-width: 100%;
  }

  .play-button-bg {
    transform: scale(1);
  }

  .play-button-container:hover .play-button-bg {
    transform: scale(1.1);
  }

  .play-button-container:hover .play-button-bg.is-image-bg {
    --tw-bg-opacity: 0.4;
  }

  .audio-seekbar {
    --progress: 0%;
    --track-bg: rgba(255, 255, 255, 0.22);
    --track-fill: rgba(255, 255, 255, 0.95);

    -webkit-appearance: none;
    appearance: none;
    display: block;
    width: 100%;
    height: 14px;
    margin: 22px 0 0 0;
    cursor: pointer;
    background: transparent;
  }

  .audio-seekbar::-webkit-slider-runnable-track {
    height: 5px;
    border-radius: 999px;
    background:
      linear-gradient(to right,
        var(--track-fill) 0%,
        var(--track-fill) var(--progress),
        var(--track-bg) var(--progress),
        var(--track-bg) 100%);
    box-shadow: inset 0 1px 1px rgba(0, 0, 0, 0.16);
  }

  .audio-seekbar::-moz-range-track {
    height: 5px;
    border-radius: 999px;
    background: var(--track-bg);
    box-shadow: inset 0 1px 1px rgba(0, 0, 0, 0.16);
  }

  .audio-seekbar::-moz-range-progress {
    height: 5px;
    border-radius: 999px;
    background: var(--track-fill);
  }

  .audio-seekbar::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 0;
    height: 0;
    border: 0;
    box-shadow: none;
  }

  .audio-seekbar::-moz-range-thumb {
    width: 0;
    height: 0;
    border: 0;
    box-shadow: none;
  }

  .audio-seekbar:focus-visible,
  .cover-art-wrap:focus-visible,
  .play-button:focus-visible {
    outline: 2px solid rgba(255, 255, 255, 0.65);
    outline-offset: 3px;
  }

  @media (max-width: 768px) {
    .audio-player {
      min-height: auto;
      padding: 1.25rem;
    }

    .audio-content {
      gap: 1rem;
      min-height: 120px;
    }

    .cover-art-wrap {
      width: 120px;
      height: 120px;
    }

    .play-button-container,
    .circular-progress,
    .play-button {
      width: 3.5rem;
      height: 3.5rem;
    }

    .audio-seekbar {
      margin-top: 18px;
    }

    .ai-music-tag {
      bottom: 0.75rem;
      right: 0.75rem;
    }
  }

  @media (max-width: 520px) {
    .audio-player {
      padding: 1rem;
    }

    .audio-content {
      flex-direction: column;
      align-items: stretch;
      gap: 1rem;
    }

    .cover-art-wrap {
      width: 100%;
      height: auto;
      aspect-ratio: 1 / 1;
      max-width: 180px;
      align-self: center;
    }

    .audio-info {
      width: 100%;
      text-align: center;
      padding-bottom: 1.5rem;
    }

    .audio-seekbar {
      margin-top: 18px;
    }

    .ai-music-tag {
      bottom: 0.75rem;
      right: 1rem;
    }
  }
</style>

<!-- Script for audio player initialization -->
<script>
  (function () {
    // Find the most recently added audio player
    const players = document.querySelectorAll('.audio-player');
    const player = players[players.length - 1];

    if (!player) {
      return;
    }

    const audio = player.querySelector('.audio-element');
    const playBtn = player.querySelector('.play-button');
    const coverArtWrap = player.querySelector('.cover-art-wrap');
    const playIcon = player.querySelector('.play-icon');
    const pauseIcon = player.querySelector('.pause-icon');
    const progressIndicator = player.querySelector('.progress-indicator');
    const seekbar = player.querySelector('.seekbar');

    if (!audio || !playBtn || !playIcon || !pauseIcon || !progressIndicator) {
      return;
    }

    let isSeeking = false;

    // Calculate the circumference of the progress circle
    const radius = parseFloat(progressIndicator.getAttribute('r'));
    const circumference = 2 * Math.PI * radius;

    // Set the dash array to the circumference
    progressIndicator.style.strokeDasharray = circumference;
    progressIndicator.style.strokeDashoffset = circumference;

    function toggleIcons(isPlaying) {
      if (isPlaying) {
        playIcon.classList.add('hidden');
        pauseIcon.classList.remove('hidden');
      } else {
        pauseIcon.classList.add('hidden');
        playIcon.classList.remove('hidden');
      }
    }

    function updateProgress(percent) {
      const offset = circumference - (percent / 100) * circumference;
      progressIndicator.style.strokeDashoffset = offset;
    }

    function updateSeekbarFill() {
      if (!seekbar || !audio.duration) {
        return;
      }

      const percent = (audio.currentTime / audio.duration) * 100;
      seekbar.style.setProperty('--progress', `${percent}%`);
    }

    function updateSeekbar() {
      if (!seekbar || isSeeking || !audio.duration) {
        return;
      }

      seekbar.value = audio.currentTime;
      updateSeekbarFill();
    }

    function seekTo(value) {
      if (!audio.duration) {
        return;
      }

      audio.currentTime = Math.min(Math.max(parseFloat(value) || 0, 0), audio.duration);

      const percent = (audio.currentTime / audio.duration) * 100;
      updateProgress(percent);
      updateSeekbarFill();
    }

    function getTrackName() {
      const src = audio.currentSrc || audio.querySelector('source')?.src || player.dataset.audioSrc || '';

      try {
        const url = new URL(src, window.location.href);
        return decodeURIComponent(url.pathname.split('/').filter(Boolean).pop() || 'unknown-track');
      } catch (error) {
        return decodeURIComponent(src.split('/').filter(Boolean).pop() || 'unknown-track');
      }
    }

    function slugify(value) {
      return value
        .replace(/\.[^/.]+$/, '')
        .toLowerCase()
        .trim()
        .replace(/&/g, 'and')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '') || 'unknown-track';
    }

    function trackPlaybackTap() {
      if (!window.goatcounter) {
        return;
      }

      const trackName = getTrackName();
      const trackSlug = slugify(trackName);
      const eventName = `music-${trackSlug}-play`;

      window.goatcounter.count({
        path: eventName,
        title: eventName,
        event: true,
      });
    }

    function resetOtherPlayers() {
      document.querySelectorAll('.audio-element').forEach(otherAudio => {
        if (otherAudio === audio || otherAudio.paused) {
          return;
        }

        otherAudio.pause();

        const otherPlayer = otherAudio.closest('.audio-player');

        if (!otherPlayer) {
          return;
        }

        const otherPlayIcon = otherPlayer.querySelector('.play-icon');
        const otherPauseIcon = otherPlayer.querySelector('.pause-icon');
        const otherProgressIndicator = otherPlayer.querySelector('.progress-indicator');
        const otherSeekbar = otherPlayer.querySelector('.seekbar');

        if (otherPauseIcon && otherPlayIcon) {
          otherPauseIcon.classList.add('hidden');
          otherPlayIcon.classList.remove('hidden');
        }

        if (otherProgressIndicator) {
          const otherRadius = parseFloat(otherProgressIndicator.getAttribute('r'));
          const otherCircumference = 2 * Math.PI * otherRadius;
          otherProgressIndicator.style.strokeDashoffset = otherCircumference;
        }

        if (otherSeekbar) {
          otherSeekbar.value = 0;
          otherSeekbar.style.setProperty('--progress', '0%');
        }
      });
    }

    function togglePlayback() {
      if (audio.paused) {
        resetOtherPlayers();

        audio.play()
          .then(() => {
            trackPlaybackTap();
          })
          .catch(error => {
            console.error('Audio playback failed:', error);
          });
      } else {
        audio.pause();
      }
    }

    playBtn.addEventListener('click', event => {
      event.stopPropagation();
      togglePlayback();
    });

    if (coverArtWrap) {
      coverArtWrap.addEventListener('click', togglePlayback);

      coverArtWrap.addEventListener('keydown', event => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          togglePlayback();
        }
      });
    }

    audio.addEventListener('play', () => {
      toggleIcons(true);
    });

    audio.addEventListener('pause', () => {
      toggleIcons(false);
    });

    audio.addEventListener('ended', () => {
      toggleIcons(false);
      updateProgress(0);

      if (seekbar) {
        seekbar.value = 0;
        seekbar.style.setProperty('--progress', '0%');
      }
    });

    audio.addEventListener('loadedmetadata', () => {
      if (seekbar && audio.duration) {
        seekbar.max = audio.duration;
        seekbar.value = audio.currentTime;
        updateSeekbarFill();
      }
    });

    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) {
        return;
      }

      const percent = (audio.currentTime / audio.duration) * 100;
      updateProgress(percent);
      updateSeekbar();
    });

    if (seekbar) {
      seekbar.addEventListener('pointerdown', () => {
        isSeeking = true;
      });

      seekbar.addEventListener('input', () => {
        seekTo(seekbar.value);
      });

      seekbar.addEventListener('change', () => {
        seekTo(seekbar.value);
        isSeeking = false;
      });

      seekbar.addEventListener('pointerup', () => {
        seekTo(seekbar.value);
        isSeeking = false;
      });

      seekbar.addEventListener('pointercancel', () => {
        isSeeking = false;
        updateSeekbar();
      });
    }
  })();
</script>
