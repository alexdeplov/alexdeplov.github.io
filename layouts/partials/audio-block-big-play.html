{{ $songName := or .songName (index . "song_name") .title (.src | path.Base) }}

<div class="mt-4 audio-player text-black rounded-xl p-6 min-h-[320px] relative overflow-hidden flex items-center"
  data-audio-src="{{ .src }}" data-lyrics-src="{{ .lyricsJson }}" data-song-name="{{ $songName }}" style="background-color: #f6f6f6;">

  <!-- Hidden audio player -->
  <audio class="audio-element hidden" preload="metadata">
    <source src="{{ .src }}" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <div class="audio-content relative z-10 flex w-full min-w-0 items-center gap-8">
    <div class="audio-visual-controls shrink-0">
    {{ if .img }}
    <div
      class="cover-art-wrap relative shrink-0 cursor-pointer overflow-hidden rounded-xl shadow-lg transition-transform duration-300 ease-in-out hover:scale-[1.02]"
      role="button" tabindex="0" aria-label="Play or pause audio">

      <img class="cover-art block h-full w-full object-cover !mt-0" src="{{ .img }}" alt="">

      <div class="absolute inset-0 flex items-center justify-center bg-black bg-opacity-10">
        <div class="play-button-container relative h-16 w-16 shrink-0 rounded-full backdrop-blur-md">
          <!-- Button background: below progress ring, scales on hover -->
          <div
            class="play-button-bg is-image-bg pointer-events-none absolute inset-0 z-0 rounded-full bg-black bg-opacity-25 transition-transform transition-colors duration-300 ease-in-out">
          </div>

          <!-- Circular Progress SVG: above dark background -->
          <svg class="circular-progress pointer-events-none absolute left-0 top-0 z-20 h-16 w-16 -rotate-90"
            viewBox="0 0 100 100">
            <circle class="progress-bg" cx="50" cy="50" r="46"
              stroke="{{ if .img }}rgba(255, 255, 255, 0.28){{ else }}rgba(0, 0, 0, 0.1){{ end }}" stroke-width="4"
              fill="none" />

            <circle class="progress-indicator" cx="50" cy="50" r="46"
              stroke="{{ if .img }}white{{ else }}#3B82F6{{ end }}" stroke-width="4" stroke-dasharray="289.027"
              stroke-dashoffset="289.027" fill="none" />
          </svg>

          <!-- Play Button: keeps original hover:scale-110 group behavior -->
          <div
            class="play-button relative z-30 flex h-16 w-16 cursor-pointer items-center justify-center rounded-full bg-transparent transition-transform duration-300 ease-in-out hover:scale-110 group">
            <div class="flex transition-transform duration-100 ease-in-out group-hover:scale-110">
              <svg class="play-icon ml-1" width="28" height="29" viewBox="0 0 23 24" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M4.86328 17.0763V5.73008C4.86328 4.67612 5.98644 4.00223 6.9164 4.49821L17.5535 10.1713C18.539 10.6969 18.539 12.1095 17.5535 12.6351L6.9164 18.3082C5.98643 18.8042 4.86328 18.1303 4.86328 17.0763Z"
                  fill="{{ if .img }}white{{ else }}black{{ end }}" />
              </svg>

              <svg class="pause-icon hidden" width="18" height="29" viewBox="0 0 24 25" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M4.78357 0.535156C5.95923 0.535156 6.54733 0.534895 6.99646 0.763672C7.39159 0.965003 7.7131 1.28651 7.91443 1.68164C8.14331 2.13085 8.14294 2.71942 8.14294 3.89551V21.1748C8.14294 22.3509 8.14331 22.9395 7.91443 23.3887C7.71311 23.7837 7.39146 24.1044 6.99646 24.3057C6.54731 24.5345 5.95936 24.5352 4.78357 24.5352H3.70349C2.5274 24.5352 1.93883 24.5345 1.48962 24.3057C1.09466 24.1044 0.772953 23.7836 0.571655 23.3887C0.342772 22.9395 0.34314 22.3509 0.34314 21.1748V3.89551C0.34314 2.71947 0.342806 2.13084 0.571655 1.68164C0.772987 1.28651 1.09449 0.965003 1.48962 0.763672C1.93883 0.534803 2.52742 0.535156 3.70349 0.535156H4.78357ZM19.7015 0.535156C20.8772 0.535156 21.4653 0.534925 21.9144 0.763672C22.3096 0.964998 22.6311 1.28652 22.8324 1.68164C23.0613 2.13085 23.0609 2.71941 23.0609 3.89551V21.1748C23.0609 22.3509 23.0613 22.9395 22.8324 23.3887C22.6311 23.7837 22.3094 24.1044 21.9144 24.3057C21.4653 24.5345 20.8774 24.5352 19.7015 24.5352H18.6215C17.4454 24.5352 16.8568 24.5345 16.4076 24.3057C16.0126 24.1043 15.6909 23.7836 15.4896 23.3887C15.2607 22.9395 15.2611 22.3509 15.2611 21.1748V3.89551C15.2611 2.7195 15.2608 2.13084 15.4896 1.68164C15.6909 1.28652 16.0125 0.965005 16.4076 0.763672C16.8568 0.534789 17.4454 0.535156 18.6215 0.535156H19.7015Z"
                  fill="{{ if .img }}white{{ else }}black{{ end }}" />
              </svg>
            </div>
          </div>
        </div>
      </div>
    </div>
    {{ else }}
    <div class="play-button-container relative mx-auto h-16 w-16 shrink-0 rounded-full backdrop-blur-md">
      <!-- Button background: below progress ring, scales on hover -->
      <div
        class="play-button-bg pointer-events-none absolute inset-0 z-0 rounded-full bg-blue-50 transition-transform duration-300 ease-in-out">
      </div>

      <!-- Circular Progress SVG: above button background -->
      <svg class="circular-progress pointer-events-none absolute left-0 top-0 z-20 h-16 w-16 -rotate-90"
        viewBox="0 0 100 100">
        <circle class="progress-bg" cx="50" cy="50" r="46" stroke="rgba(0, 0, 0, 0.1)" stroke-width="4" fill="none" />
        <circle class="progress-indicator" cx="50" cy="50" r="46" stroke="#3B82F6" stroke-width="4"
          stroke-dasharray="289.027" stroke-dashoffset="289.027" fill="none" />
      </svg>

      <!-- Play Button: keeps original hover:scale-110 group behavior -->
      <div
        class="play-button relative z-30 flex h-16 w-16 cursor-pointer items-center justify-center rounded-full bg-transparent transition-transform duration-300 ease-in-out hover:scale-110 group">
        <div class="flex transition-transform duration-100 ease-in-out group-hover:scale-110">
          <svg class="play-icon ml-1" width="28" height="29" viewBox="0 0 23 24" fill="none"
            xmlns="http://www.w3.org/2000/svg">
            <path
              d="M4.86328 17.0763V5.73008C4.86328 4.67612 5.98644 4.00223 6.9164 4.49821L17.5535 10.1713C18.539 10.6969 18.539 12.1095 17.5535 12.6351L6.9164 18.3082C5.98643 18.8042 4.86328 18.1303 4.86328 17.0763Z"
              fill="black" />
          </svg>

          <svg class="pause-icon hidden" width="18" height="29" viewBox="0 0 24 25" fill="none"
            xmlns="http://www.w3.org/2000/svg">
            <path
              d="M4.78357 0.535156C5.95923 0.535156 6.54733 0.534895 6.99646 0.763672C7.39159 0.965003 7.7131 1.28651 7.91443 1.68164C8.14331 2.13085 8.14294 2.71942 8.14294 3.89551V21.1748C8.14294 22.3509 8.14331 22.9395 7.91443 23.3887C7.71311 23.7837 7.39146 24.1044 6.99646 24.3057C6.54731 24.5345 5.95936 24.5352 4.78357 24.5352H3.70349C2.5274 24.5352 1.93883 24.5345 1.48962 24.3057C1.09466 24.1044 0.772953 23.7836 0.571655 23.3887C0.342772 22.9395 0.34314 22.3509 0.34314 21.1748V3.89551C0.34314 2.71947 0.342806 2.13084 0.571655 1.68164C0.772987 1.28651 1.09449 0.965003 1.48962 0.763672C1.93883 0.534803 2.52742 0.535156 3.70349 0.535156H4.78357ZM19.7015 0.535156C20.8772 0.535156 21.4653 0.534925 21.9144 0.763672C22.3096 0.964998 22.6311 1.28652 22.8324 1.68164C23.0613 2.13085 23.0609 2.71941 23.0609 3.89551V21.1748C23.0609 22.3509 23.0613 22.9395 22.8324 23.3887C22.6311 23.7837 22.3094 24.1044 21.9144 24.3057C21.4653 24.5345 20.8774 24.5352 19.7015 24.5352H18.6215C17.4454 24.5352 16.8568 24.5345 16.4076 24.3057C16.0126 24.1043 15.6909 23.7836 15.4896 23.3887C15.2607 22.9395 15.2611 22.3509 15.2611 21.1748V3.89551C15.2611 2.7195 15.2608 2.13084 15.4896 1.68164C15.6909 1.28652 16.0125 0.965005 16.4076 0.763672C16.8568 0.534789 17.4454 0.535156 18.6215 0.535156H19.7015Z"
              fill="black" />
          </svg>
        </div>
      </div>
    </div>
    {{ end }}

      <div class="audio-track-meta mt-3 min-w-0 text-center leading-[1.2]">
        <a class="block text-sm font-semibold hover:underline" href="{{ .src }}" download>
          {{ $songName }}
        </a>

        <div class="mt-1 text-xs font-medium text-zinc-700 opacity-70">
          Sashka Echo &bull; Suno AI
        </div>
      </div>

      <input class="seekbar audio-seekbar" type="range" min="0" max="100" value="0" step="0.1" aria-label="Seek audio">

      <div class="audio-time-indicator mt-1 flex justify-between text-xs font-medium tabular-nums text-zinc-700" aria-live="off">
        <span class="audio-time-left">0:00</span>
        <span class="audio-time-total">0:00</span>
      </div>
    </div>

    {{ with .lyrics }}
    <div class="audio-lyrics min-w-0 flex-1 text-left">
      <div class="audio-lyrics-scroll">
        {{ . | safeHTML }}
      </div>
    </div>
    {{ end }}
  </div>

</div>

<style>
  .audio-player {
    box-sizing: border-box;
    width: 100%;
    color: #18181b;
  }

  .content .audio-player {
    margin-top: 3rem;
  }

  .audio-content {
    min-height: 260px;
  }

  .audio-visual-controls {
    width: 170px;
  }

  .cover-art-wrap {
    width: 170px;
    height: 170px;
    margin: 0 auto;
  }

  .cover-art-wrap::after {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 40;
    border-radius: inherit;
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15);
    pointer-events: none;
  }

  .audio-track-meta {
    max-width: 100%;
  }

  .audio-track-meta a {
    color: #18181b;
    overflow-wrap: anywhere;
    text-decoration: none;
    text-underline-offset: 0.16em;
    transition: color 160ms ease;
  }

  .audio-track-meta a:hover,
  .audio-track-meta a:focus-visible {
    color: var(--accent-orange, #f46c04);
    text-decoration: underline;
  }

  .audio-lyrics {
    color: rgba(24, 24, 27, 0.74);
  }

  .audio-lyrics-scroll {
    max-height: 250px;
    overflow-y: auto;
    padding-right: 0.75rem;
    font-size: 1rem;
    font-weight: 400;
    line-height: 1.5;
  }

  .audio-lyrics-scroll :first-child {
    margin-top: 0;
  }

  .audio-lyrics-scroll h3 {
    margin: 1.1rem 0 0.4rem 0;
    color: rgba(24, 24, 27, 0.46);
    font-size: 0.9rem;
    font-weight: 500;
    line-height: 1.25;
  }

  .audio-lyrics-scroll p {
    margin: 0 0 0.85rem 0;
  }

  .synced-lyrics-section {
    margin: 1.1rem 0 0.4rem 0;
    color: rgba(24, 24, 27, 0.46);
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0;
  }

  .synced-lyrics-line {
    display: block;
    width: 100%;
    border: 0;
    background: transparent;
    color: rgba(24, 24, 27, 0.92);
    cursor: pointer;
    padding: 0.22rem 0;
    text-align: left;
    font: inherit;
    font-weight: 400;
    line-height: 1.45;
  }

  .synced-lyrics-line:hover,
  .synced-lyrics-line:focus-visible {
    color: rgba(24, 24, 27, 0.82);
    outline: none;
  }

  .synced-lyrics-line.is-active {
    color: var(--accent-orange, #f46c04);
    font-size: 24px;
    font-weight: 600;
    line-height: 1.25;
    transform: none;
  }

  .play-button-bg {
    transform: scale(1);
  }

  .play-button-container:hover .play-button-bg {
    transform: scale(1.1);
  }

  .play-button-container:hover .play-button-bg.is-image-bg {
    --tw-bg-opacity: 0.4;
  }

  .audio-seekbar {
    --progress: 0%;
    --track-bg: rgba(24, 24, 27, 0.16);
    --track-fill: rgba(24, 24, 27, 0.9);

    -webkit-appearance: none;
    appearance: none;
    display: block;
    width: 100%;
    height: 14px;
    margin: 16px 0 0 0;
    cursor: pointer;
    background: transparent;
  }

  .audio-time-indicator {
    line-height: 1;
  }

  .audio-seekbar::-webkit-slider-runnable-track {
    height: 5px;
    border-radius: 999px;
    background:
      linear-gradient(to right,
        var(--track-fill) 0%,
        var(--track-fill) var(--progress),
        var(--track-bg) var(--progress),
        var(--track-bg) 100%);
  }

  .audio-seekbar::-moz-range-track {
    height: 5px;
    border-radius: 999px;
    background: var(--track-bg);
  }

  .audio-seekbar::-moz-range-progress {
    height: 5px;
    border-radius: 999px;
    background: var(--track-fill);
  }

  .audio-seekbar::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 0;
    height: 0;
    border: 0;
    box-shadow: none;
  }

  .audio-seekbar::-moz-range-thumb {
    width: 0;
    height: 0;
    border: 0;
    box-shadow: none;
  }

  .audio-seekbar:focus-visible,
  .cover-art-wrap:focus-visible,
  .play-button:focus-visible {
    outline: 2px solid rgba(24, 24, 27, 0.55);
    outline-offset: 3px;
  }

  @media (max-width: 768px) {
    .audio-player {
      min-height: auto;
      padding: 1.25rem;
    }

    .audio-content {
      gap: 1rem;
      min-height: 230px;
    }

    .audio-visual-controls {
      width: 170px;
    }

    .cover-art-wrap {
      width: 170px;
      height: 170px;
    }

    .play-button-container,
    .circular-progress,
    .play-button {
      width: 3.5rem;
      height: 3.5rem;
    }

  @media (max-width: 520px) {
    .audio-player {
      padding: 1rem;

    .content .audio-player {
      margin-top: 2.5rem;
    }

    .audio-content {
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .audio-visual-controls {
      width: 100%;
      max-width: 170px;
    }

    .cover-art-wrap {
      width: 170px;
      height: 170px;
      max-width: 100%;
      align-self: center;
    }

    .audio-lyrics {
      width: 100%;
    }

    .audio-lyrics-scroll {
      max-height: 220px;
      padding-right: 0.5rem;
    }

    .audio-seekbar {
      margin-top: 14px;
    }

  }
</style>

<!-- Script for audio player initialization -->
<script>
  (function () {
    if (!window.__audioSpacebarPauseHandler) {
      window.__audioSpacebarPauseHandler = true;

      document.addEventListener('keydown', event => {
        if (
          event.defaultPrevented ||
          event.repeat ||
          (event.key !== ' ' && event.key !== 'Spacebar' && event.code !== 'Space')
        ) {
          return;
        }

        const target = event.target;

        if (
          target instanceof Element &&
          target.closest(
            'textarea, select, [contenteditable=""], [contenteditable="true"], [contenteditable="plaintext-only"], ' +
            'input:not([type]), input[type="date"], input[type="datetime-local"], input[type="email"], ' +
            'input[type="month"], input[type="number"], input[type="password"], input[type="search"], ' +
            'input[type="tel"], input[type="text"], input[type="time"], input[type="url"], input[type="week"]'
          )
        ) {
          return;
        }

        const playingAudios = Array.from(document.querySelectorAll('.audio-element'))
          .filter(audioElement => !audioElement.paused && !audioElement.ended);

        if (!playingAudios.length) {
          return;
        }

        event.preventDefault();
        playingAudios.forEach(audioElement => {
          audioElement.pause();
        });
      });
    }

    function getCurrentPlayer() {
      const script = document.currentScript;

      if (script) {
        let node = script.previousElementSibling;

        while (node) {
          if (node.matches && node.matches('.audio-player')) {
            return node;
          }

          node = node.previousElementSibling;
        }
      }

      const players = document.querySelectorAll('.audio-player:not([data-audio-initialized])');
      return players[players.length - 1] || null;
    }

    const player = getCurrentPlayer();

    if (!player) {
      return;
    }

    if (player.dataset.audioInitialized === 'true') {
      return;
    }

    player.dataset.audioInitialized = 'true';

    const audio = player.querySelector('.audio-element');
    const playBtn = player.querySelector('.play-button');
    const coverArtWrap = player.querySelector('.cover-art-wrap');
    const playIcon = player.querySelector('.play-icon');
    const pauseIcon = player.querySelector('.pause-icon');
    const progressIndicator = player.querySelector('.progress-indicator');
    const seekbar = player.querySelector('.seekbar');
    const timeIndicator = player.querySelector('.audio-time-indicator');
    const timeLeft = player.querySelector('.audio-time-left');
    const timeTotal = player.querySelector('.audio-time-total');
    const lyricsScroll = player.querySelector('.audio-lyrics-scroll');
    const lyricsSrc = player.dataset.lyricsSrc || '';

    if (!audio || !playBtn || !playIcon || !pauseIcon || !progressIndicator) {
      return;
    }

    let isSeeking = false;
    let ignoreNextSeekChange = false;
    let syncedLyricItems = [];
    let activeLyricIndex = -1;

    // Calculate the circumference of the progress circle
    const radius = parseFloat(progressIndicator.getAttribute('r'));
    const circumference = 2 * Math.PI * radius;

    // Set the dash array to the circumference
    progressIndicator.style.strokeDasharray = circumference;
    progressIndicator.style.strokeDashoffset = circumference;

    function getPath(value) {
      if (!value) {
        return '';
      }

      try {
        return new URL(value, window.location.href).pathname;
      } catch (error) {
        return value;
      }
    }

    function decodePath(value) {
      try {
        return decodeURIComponent(value);
      } catch (error) {
        return value;
      }
    }

    function normalizeTrackKey(value) {
      return decodePath(getPath(value)).replace(/\/{2,}/g, '/');
    }

    function getCurrentTrackPath() {
      const src = player.dataset.audioSrc || audio.querySelector('source')?.getAttribute('src') || audio.currentSrc || '';
      return getPath(src);
    }

    function getTrackLyrics(payload) {
      if (!payload || !payload.tracks) {
        return null;
      }

      const source = audio.querySelector('source');
      const candidates = [
        getCurrentTrackPath(),
        player.dataset.audioSrc || '',
        source ? source.getAttribute('src') || '' : '',
        audio.currentSrc || '',
      ];

      for (const candidate of candidates) {
        if (candidate && payload.tracks[candidate]) {
          return payload.tracks[candidate];
        }

        const decodedCandidate = decodePath(candidate);

        if (decodedCandidate && payload.tracks[decodedCandidate]) {
          return payload.tracks[decodedCandidate];
        }
      }

      const normalizedCandidates = new Set(candidates.map(normalizeTrackKey).filter(Boolean));

      for (const [trackKey, trackLyrics] of Object.entries(payload.tracks)) {
        if (normalizedCandidates.has(normalizeTrackKey(trackKey))) {
          return trackLyrics;
        }
      }

      return null;
    }

    function scrollActiveLyricIntoView(element) {
      if (!lyricsScroll || !element) {
        return;
      }

      const targetTop = element.offsetTop - (lyricsScroll.clientHeight / 2) + (element.clientHeight / 2);
      lyricsScroll.scrollTo({
        top: Math.max(0, targetTop),
        behavior: 'smooth',
      });
    }

    function updateSyncedLyrics(shouldScroll) {
      if (!syncedLyricItems.length) {
        return;
      }

      const currentTime = Number.isFinite(audio.currentTime) ? audio.currentTime : 0;
      let nextIndex = -1;

      for (let index = 0; index < syncedLyricItems.length; index += 1) {
        if (syncedLyricItems[index].time <= currentTime) {
          nextIndex = index;
        } else {
          break;
        }
      }

      if (nextIndex === activeLyricIndex) {
        return;
      }

      if (activeLyricIndex >= 0 && syncedLyricItems[activeLyricIndex]) {
        syncedLyricItems[activeLyricIndex].element.classList.remove('is-active');
      }

      activeLyricIndex = nextIndex;

      if (activeLyricIndex < 0) {
        return;
      }

      const activeItem = syncedLyricItems[activeLyricIndex];

      if (!activeItem) {
        return;
      }

      activeItem.element.classList.add('is-active');

      if (shouldScroll) {
        scrollActiveLyricIntoView(activeItem.element);
      }
    }

    function renderSyncedLyrics(trackLyrics) {
      if (!lyricsScroll || !trackLyrics || !Array.isArray(trackLyrics.lines)) {
        return;
      }

      lyricsScroll.innerHTML = '';
      syncedLyricItems = [];
      activeLyricIndex = -1;

      trackLyrics.lines.forEach(entry => {
        const time = Number(entry.time);

        if (entry.type === 'section') {
          const section = document.createElement('div');
          section.className = 'synced-lyrics-section';
          section.textContent = entry.text || '';
          lyricsScroll.appendChild(section);
          return;
        }

        const line = document.createElement('button');
        line.type = 'button';
        line.className = 'synced-lyrics-line';
        line.textContent = entry.text || '';

        if (Number.isFinite(time)) {
          line.dataset.time = String(time);
          line.addEventListener('click', () => {
            seekTo(time);
            updateSyncedLyrics(true);
            playAudio();
          });
          syncedLyricItems.push({ time, element: line });
        }

        lyricsScroll.appendChild(line);
      });

      updateSyncedLyrics(true);
    }

    function loadSyncedLyrics() {
      if (!lyricsScroll || !lyricsSrc || !window.fetch) {
        return;
      }

      window.__audioLyricsCache = window.__audioLyricsCache || {};

      if (!window.__audioLyricsCache[lyricsSrc]) {
        window.__audioLyricsCache[lyricsSrc] = fetch(lyricsSrc).then(response => {
          if (!response.ok) {
            throw new Error(`Lyrics JSON failed to load: ${response.status}`);
          }

          return response.json();
        });
      }

      window.__audioLyricsCache[lyricsSrc]
        .then(payload => {
          const trackLyrics = getTrackLyrics(payload);

          if (trackLyrics) {
            renderSyncedLyrics(trackLyrics);
          } else {
            console.warn('Synced lyrics missing for track:', getCurrentTrackPath());
          }
        })
        .catch(error => {
          console.warn('Synced lyrics unavailable:', error);
        });
    }

    function toggleIcons(isPlaying) {
      if (isPlaying) {
        playIcon.classList.add('hidden');
        pauseIcon.classList.remove('hidden');
      } else {
        pauseIcon.classList.add('hidden');
        playIcon.classList.remove('hidden');
      }
    }

    function updateProgress(percent) {
      const offset = circumference - (percent / 100) * circumference;
      progressIndicator.style.strokeDashoffset = offset;
    }

    function updateSeekbarFill(currentTime = audio.currentTime) {
      if (!seekbar || !audio.duration) {
        return;
      }

      const progressTime = Number.isFinite(currentTime) ? currentTime : 0;
      const percent = (progressTime / audio.duration) * 100;
      seekbar.style.setProperty('--progress', `${percent}%`);
    }

    function formatTime(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) {
        return '0:00';
      }

      const totalSeconds = Math.floor(seconds);
      const minutes = Math.floor(totalSeconds / 60);
      const remainingSeconds = totalSeconds % 60;

      return `${minutes}:${String(remainingSeconds).padStart(2, '0')}`;
    }

    function updateTimeIndicator(currentTimeOverride) {
      if (!timeIndicator) {
        return;
      }

      const currentTime = Number.isFinite(currentTimeOverride)
        ? currentTimeOverride
        : Number.isFinite(audio.currentTime)
          ? audio.currentTime
          : 0;
      const duration = Number.isFinite(audio.duration) ? audio.duration : 0;

      if (timeLeft && timeTotal) {
        timeLeft.textContent = formatTime(currentTime);
        timeTotal.textContent = formatTime(duration);
        return;
      }

      timeIndicator.textContent = `${formatTime(currentTime)} ${formatTime(duration)}`;
    }

    function updateSeekbar() {
      if (!seekbar || isSeeking || !audio.duration) {
        return;
      }

      seekbar.value = audio.currentTime;
      updateSeekbarFill();
    }

    function getSeekTime(value) {
      if (!audio.duration) {
        return null;
      }

      const parsedValue = parseFloat(value);
      const targetTime = Number.isFinite(parsedValue) ? parsedValue : 0;
      return Math.min(Math.max(targetTime, 0), audio.duration);
    }

    function updateSeekPreview(value) {
      const seekTime = getSeekTime(value);

      if (seekTime === null) {
        return false;
      }

      const percent = (seekTime / audio.duration) * 100;

      if (seekbar) {
        seekbar.value = seekTime;
      }

      updateProgress(percent);
      updateSeekbarFill(seekTime);
      updateTimeIndicator(seekTime);
      return true;
    }

    function seekTo(value) {
      const seekTime = getSeekTime(value);

      if (seekTime === null) {
        return false;
      }

      const currentTime = Number.isFinite(audio.currentTime) ? audio.currentTime : 0;

      if (Math.abs(currentTime - seekTime) > 0.01) {
        audio.currentTime = seekTime;
      }

      const percent = (seekTime / audio.duration) * 100;

      if (seekbar) {
        seekbar.value = seekTime;
      }

      updateProgress(percent);
      updateSeekbarFill(seekTime);
      updateTimeIndicator(seekTime);
      updateSyncedLyrics(true);
      return true;
    }

    function getTrackName() {
      const songName = (player.dataset.songName || '').trim();

      if (songName) {
        return songName;
      }

      const src = audio.currentSrc || audio.querySelector('source')?.src || player.dataset.audioSrc || '';

      try {
        const url = new URL(src, window.location.href);
        return decodeURIComponent(url.pathname.split('/').filter(Boolean).pop() || 'unknown-track');
      } catch (error) {
        return decodeURIComponent(src.split('/').filter(Boolean).pop() || 'unknown-track');
      }
    }

    function slugify(value) {
      return value
        .replace(/\.[^/.]+$/, '')
        .toLowerCase()
        .trim()
        .replace(/&/g, 'and')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '') || 'unknown-track';
    }

    function trackPlaybackTap() {
      if (!window.goatcounter) {
        return;
      }

      const trackName = getTrackName();
      const trackSlug = slugify(trackName);
      const eventName = `music-${trackSlug}-play`;

      window.goatcounter.count({
        path: eventName,
        title: eventName,
        event: true,
      });
    }

    function resetOtherPlayers() {
      document.querySelectorAll('.audio-element').forEach(otherAudio => {
        if (otherAudio === audio || otherAudio.paused) {
          return;
        }

        otherAudio.pause();

        const otherPlayer = otherAudio.closest('.audio-player');

        if (!otherPlayer) {
          return;
        }

        const otherPlayIcon = otherPlayer.querySelector('.play-icon');
        const otherPauseIcon = otherPlayer.querySelector('.pause-icon');
        const otherProgressIndicator = otherPlayer.querySelector('.progress-indicator');
        const otherSeekbar = otherPlayer.querySelector('.seekbar');
        const otherTimeIndicator = otherPlayer.querySelector('.audio-time-indicator');

        if (otherPauseIcon && otherPlayIcon) {
          otherPauseIcon.classList.add('hidden');
          otherPlayIcon.classList.remove('hidden');
        }

        if (otherProgressIndicator) {
          const otherRadius = parseFloat(otherProgressIndicator.getAttribute('r'));
          const otherCircumference = 2 * Math.PI * otherRadius;
          otherProgressIndicator.style.strokeDashoffset = otherCircumference;
        }

        if (otherSeekbar) {
          otherSeekbar.value = 0;
          otherSeekbar.style.setProperty('--progress', '0%');
        }

        if (otherTimeIndicator) {
          const otherDuration = Number.isFinite(otherAudio.duration) ? otherAudio.duration : 0;
          const otherTimeLeft = otherPlayer.querySelector('.audio-time-left');
          const otherTimeTotal = otherPlayer.querySelector('.audio-time-total');

          if (otherTimeLeft && otherTimeTotal) {
            otherTimeLeft.textContent = '0:00';
            otherTimeTotal.textContent = formatTime(otherDuration);
          } else {
            otherTimeIndicator.textContent = `0:00 ${formatTime(otherDuration)}`;
          }
        }
      });
    }

    function playAudio() {
      if (!audio.paused) {
        return;
      }

      resetOtherPlayers();

      audio.play()
        .then(() => {
          trackPlaybackTap();
        })
        .catch(error => {
          console.error('Audio playback failed:', error);
        });
    }

    function togglePlayback() {
      if (audio.paused) {
        playAudio();
      } else {
        audio.pause();
      }
    }

    playBtn.addEventListener('click', event => {
      event.stopPropagation();
      togglePlayback();
    });

    if (coverArtWrap) {
      coverArtWrap.addEventListener('click', togglePlayback);

      coverArtWrap.addEventListener('keydown', event => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          togglePlayback();
        }
      });
    }

    audio.addEventListener('play', () => {
      toggleIcons(true);
    });

    audio.addEventListener('pause', () => {
      toggleIcons(false);
    });

    audio.addEventListener('ended', () => {
      toggleIcons(false);
      audio.currentTime = 0;
      updateProgress(0);

      if (seekbar) {
        seekbar.value = 0;
        seekbar.style.setProperty('--progress', '0%');
      }

      updateTimeIndicator();
      updateSyncedLyrics(true);
    });

    audio.addEventListener('loadedmetadata', () => {
      if (seekbar && audio.duration) {
        seekbar.max = audio.duration;
        seekbar.value = audio.currentTime;
        updateSeekbarFill();
      }

      updateTimeIndicator();
      updateSyncedLyrics(true);
    });

    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) {
        return;
      }

      const percent = (audio.currentTime / audio.duration) * 100;
      updateProgress(percent);
      updateSeekbar();
      updateTimeIndicator();
      updateSyncedLyrics(true);
    });

    loadSyncedLyrics();
    updateTimeIndicator();

    if (seekbar) {
      seekbar.addEventListener('pointerdown', () => {
        isSeeking = true;
        ignoreNextSeekChange = false;
      });

      seekbar.addEventListener('input', () => {
        if (isSeeking) {
          updateSeekPreview(seekbar.value);
          return;
        }

        seekTo(seekbar.value);
      });

      seekbar.addEventListener('change', () => {
        if (ignoreNextSeekChange) {
          ignoreNextSeekChange = false;
          return;
        }

        seekTo(seekbar.value);
        isSeeking = false;
      });

      seekbar.addEventListener('pointerup', () => {
        if (!isSeeking) {
          return;
        }

        seekTo(seekbar.value);
        isSeeking = false;
        ignoreNextSeekChange = true;
      });

      seekbar.addEventListener('pointercancel', () => {
        isSeeking = false;
        ignoreNextSeekChange = false;
        updateSeekbar();
        updateTimeIndicator();
      });
    }
  })();
</script>
